version: 2

builds:
  - main: ./cmd/shimsumm
    binary: shimsumm
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz

checksum:
  name_template: "checksums.txt"

changelog:
  use: git

release:
  github:
    owner: mambocab
    name: shimsumm
